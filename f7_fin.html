<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory TV Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  overflow: hidden;
}

/* HEADER */
.header {
  position: absolute;
  top: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  color: white;
  z-index: 10;
  background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover no-repeat;
}

.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(20,0,40,0.85), rgba(40,0,80,0.6));
  z-index: 0;
}

.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 20px 20px;
  opacity: 0.15;
  animation: starsMove 20s linear infinite;
  z-index: 0;
}

@keyframes starsMove {
  from { transform: translateY(0); }
  to { transform: translateY(50px); }
}

.header > * {
  position: relative;
  z-index: 1;
}

/* HOME */
.home-btn {
  padding: 6px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: #e9d5ff;
  border: none;
  cursor: pointer;
}

.title {
  font-size: 22px;
  color: #e9d5ff;
}

.clock {
  background: rgba(255,255,255,0.08);
  padding: 8px 16px;
  border-radius: 20px;
}

/* PAGE */
.page {
  position: absolute;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  opacity: 0;
  transition: opacity 1s ease;
}

.page.active {
  opacity: 1;
  z-index: 1;
}

.page iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  <button class="home-btn" onclick="goHome()">🏠 Home</button>
  <div class="title">Finishing F7</div>
  <div class="clock" id="clock"></div>
</div>

<!-- PAGE 1 -->
<div class="page active">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=93c15d6c-7560-47f7-820b-207b66a31370&accessTicket=dd0054c9-3260-4a9f-ba81-2896690418bf&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 2 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=10cb0d8e-b95d-41ca-9cb5-560e8049a3fe&accessTicket=de8ffa6c-69f9-41c3-ac83-e9a2f3158562&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 3 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=652a4ebb-af11-4a05-b59c-c26eca392637&accessTicket=6a4cebe5-f388-4d35-8301-ac28d1fcc27c&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 4 -->
<div class="page">
  <!-- TEST nếu bị lỗi -->
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=e1c2578c-f5e5-4a2e-8f3a-4e94b4e5048c&accessTicket=00c63fe7-1789-4347-bfdd-fa22fb82ca9d&dd_orientation=auto"></iframe>
</div>

<script>
// CLOCK
setInterval(() => {
  document.getElementById("clock").innerHTML = new Date().toLocaleString();
}, 1000);

// HOME
function goHome() {
  window.location.href = "index.html";
}

// SWITCH PAGE (FIX CHUẨN)
let currentPage = 0;
const pages = document.querySelectorAll(".page");

setInterval(() => {

  // ẨN tất cả
  pages.forEach(p => p.classList.remove("active"));

  // TĂNG index
  currentPage = (currentPage + 1) % pages.length;

  // HIỆN page
  pages[currentPage].classList.add("active");

  console.log("Đang chạy page:", currentPage + 1);

}, 10000);

// REFRESH IFRAME
setInterval(() => {
  document.querySelectorAll("iframe").forEach(i => i.src = i.src);
}, 300000);

// FULLSCREEN
document.body.addEventListener("click", () => {
  document.documentElement.requestFullscreen();
});

// RELOAD
setInterval(() => {
  location.reload();
}, 1800000);
</script>

</body>
</html>
