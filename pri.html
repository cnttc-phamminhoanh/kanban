<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Printing Dashboard</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='40' fill='black'/>
<circle cx='50' cy='50' r='25' fill='none' stroke='violet' stroke-width='3'/>
<circle cx='50' cy='50' r='5' fill='violet'/>
</svg>">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- CSS CHUNG -->
<link rel="stylesheet" href="dashboard.css">

<!-- MÀU RIÊNG PRINTING -->
<style>
:root {
  --main-color: #06b6d4; /* 🔷 cyan */
}
</style>

</head>

<body>

<div class="header">
  <button class="home-btn" onclick="goHome()">
    <i class="fa-solid fa-print"></i> Home
  </button>

  <div class="title">Printing Department</div>

  <div class="clock" id="clockRight"></div>
</div>

<!-- PAGE 1 -->
<div class="page active">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=93c15d6c-7560-47f7-820b-207b66a31370&accessTicket=dd0054c9-3260-4a9f-ba81-2896690418bf&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 2 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=10cb0d8e-b95d-41ca-9cb5-560e8049a3fe&accessTicket=de8ffa6c-69f9-41c3-ac83-e9a2f3158562&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 3 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=652a4ebb-af11-4a05-b59c-c26eca392637&accessTicket=6a4cebe5-f388-4d35-8301-ac28d1fcc27c&dd_orientation=auto"></iframe>
</div>

<script>
// CLOCK
setInterval(updateClock, 1000);
updateClock();

function updateClock() {
  const now = new Date();
  document.getElementById("clockRight").innerHTML =
    now.toLocaleString("en-GB", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });
}

// HOME
function goHome() {
  window.location.href = "index.html";
}

// SWITCH PAGE
let currentPage = 0;
const pages = document.querySelectorAll(".page");

setInterval(() => {
  pages[currentPage].classList.remove("active");

  currentPage = (currentPage + 1) % pages.length;

  setTimeout(() => {
    pages[currentPage].classList.add("active");
  }, 200);
}, 10000);

// REFRESH IFRAME
setInterval(() => {
  document.querySelectorAll("iframe").forEach(i => i.src = i.src);
}, 300000);

// FULLSCREEN
document.body.addEventListener("click", () => {
  document.documentElement.requestFullscreen();
});

// AUTO RELOAD
setInterval(() => {
  location.reload();
}, 1800000);
</script>

</body>
</html>
