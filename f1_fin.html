<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory TV Dashboard</title>
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='40' fill='black'/>
<circle cx='50' cy='50' r='25' fill='none' stroke='violet' stroke-width='3'/>
<circle cx='50' cy='50' r='5' fill='violet'/>
</svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="header">
  <button class="home-btn" onclick="goHome()">
  <i class="fa-solid fa-house"></i> Home
</button>
  <div class="title">Factory 01 (Finishing)</div>
  <div class="clock" id="clockRight"></div>
</div>
<div class="page active">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=3648518b-3197-4133-946c-6b33a4a80dbf&accessTicket=5f5f05cd-ad16-4236-a44c-36ebc5ea9cf4&dd_orientation=auto"></iframe>
</div>
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=3648518b-3197-4133-946c-6b33a4a80dbf&accessTicket=5f5f05cd-ad16-4236-a44c-36ebc5ea9cf4&dd_orientation=auto"></iframe>
</div>
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=3648518b-3197-4133-946c-6b33a4a80dbf&accessTicket=5f5f05cd-ad16-4236-a44c-36ebc5ea9cf4&dd_orientation=auto"></iframe>
</div>
<script>
setInterval(updateClock, 1000);
updateClock();
function updateClock() {
  const now = new Date();
  document.getElementById("clockRight").innerHTML =
    now.toLocaleString("en-GB", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });
}
function goHome() {
  window.location.href = "index.html";
}
let currentPage = 0;
const pages = document.querySelectorAll(".page");
setInterval(() => {
  pages[currentPage].classList.remove("active");
  currentPage = (currentPage + 1) % pages.length;
  setTimeout(() => {
    pages[currentPage].classList.add("active");
  }, 200);
}, 10000);
setInterval(() => {
  document.querySelectorAll("iframe").forEach(i => i.src = i.src);
}, 300000);

document.body.addEventListener("click", () => {
  document.documentElement.requestFullscreen();
});
setInterval(() => {
  location.reload();
}, 1800000);
</script>
</body>
</html>
