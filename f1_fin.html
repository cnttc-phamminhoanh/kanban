<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory TV Dashboard</title>
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='40' fill='black'/>
<circle cx='50' cy='50' r='25' fill='none' stroke='violet' stroke-width='3'/>
<circle cx='50' cy='50' r='5' fill='violet'/>
</svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="header">
  <button class="home-btn" onclick="goHome()">
    <i class="fa-solid fa-house"></i> Home
  </button>
  <div class="control-box">
    <div class="control-group">
      <button class="nav-btn" onclick="prevPage()">&#10094;</button>
      <button class="nav-btn" onclick="nextPage()">&#10095;</button>
    </div>

    <div class="control-group">
      <span class="control-label">Auto refresh</span>
      <input id="intervalInput" type="number" min="0.1" step="0.1">
      <span class="control-label">min</span>
    </div>

    <div class="control-group">
      <button class="preset-btn" onclick="setPreset(this,0.17)">10s</button>
      <button class="preset-btn" onclick="setPreset(this,0.5)">30s</button>
      <button class="preset-btn" onclick="setPreset(this,1)">1m</button>
      <button class="preset-btn" onclick="setPreset(this,5)">5m</button>
    </div>
  </div>
  <div class="title">Factory 01 (Finishing)</div>
  <div class="clock" id="clockRight"></div>
</div>
<div class="page-indicator" id="pageIndicator"></div>
<div class="page active"><iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=8179a714-e66e-497e-8509-e68070224ca3&accessTicket=3b2dfd80-b5c8-4faf-bdc5-0e31d00373d7"></iframe></div>
<div class="page"><iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=917c63dc-a955-414c-b4aa-cfaa1fd4e08a&accessTicket=ee3f2587-51cb-4c92-9a17-2e192eb638b3"></iframe></div>
<div class="page"><iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=84ec7ef0-e293-4e29-9253-0a9ecc3d1863&accessTicket=b3c38ada-3eeb-4a64-8483-64b866a34062"></iframe></div>
<script>
setInterval(updateClock, 1000);
updateClock();
function updateClock() {
  const now = new Date();
  document.getElementById("clockRight").innerHTML =
    now.toLocaleString("en-GB", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });
}
function goHome() {
  window.location.href = "index.html";
}

// PAGE
let currentPage = 0;
const pages = document.querySelectorAll(".page");

function showPage(i) {
  pages[currentPage].classList.remove("active");
  currentPage = (i + pages.length) % pages.length;
  pages[currentPage].classList.add("active");
  updateIndicator();
}

// INDICATOR
function updateIndicator() {
  pageIndicator.innerHTML = (currentPage + 1) + " / " + pages.length;
}

// INTERVAL
let intervalTime;
let autoSlide;

let saved = localStorage.getItem("slideInterval") || 0.17;
intervalInput.value = saved;
intervalTime = saved * 60000;

function startAuto() {
  clearInterval(autoSlide);
  autoSlide = setInterval(() => {
    showPage(currentPage + 1);
  }, intervalTime);
}

function updateInterval() {
  let val = parseFloat(intervalInput.value);
  if (!val || val <= 0) val = 0.17;

  intervalTime = val * 60000;
  localStorage.setItem("slideInterval", val);
  startAuto();
}

function setPreset(el, val) {
  intervalInput.value = val;
  updateInterval();

  document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

// BUTTON
function nextPage() { showPage(currentPage + 1); startAuto(); }
function prevPage() { showPage(currentPage - 1); startAuto(); }

// INIT
startAuto();
updateIndicator();

// AUTO HIDE HEADER
let hideTimer;
function showHeader() {
  header.classList.remove("hidden");
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    header.classList.add("hidden");
  }, 4000);
}

document.addEventListener("mousemove", showHeader);
document.addEventListener("click", showHeader);
showHeader();

setInterval(() => {
  document.querySelectorAll("iframe").forEach(i => i.src = i.src);
}, 300000);

document.body.addEventListener("click", () => {
  document.documentElement.requestFullscreen();
});
</script>
</body>
</html>
