<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory TV Dashboard</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='40' fill='black'/>
<circle cx='50' cy='50' r='25' fill='none' stroke='violet' stroke-width='3'/>
<circle cx='50' cy='50' r='5' fill='violet'/>
</svg>">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- CSS CHUNG -->
<link rel="stylesheet" href="dashboard.css">

<!-- MÀU RIÊNG F9 -->
<style>
:root {
  --main-color: #8b5cf6; /* 🟣 tím */
}
</style>

</head>

<body>

<div class="header">
  <button class="home-btn" onclick="goHome()">
    <i class="fa-solid fa-house"></i> Home
  </button>

  <div class="title">Factory 09 (Finishing)</div>

  <div class="clock" id="clockRight"></div>
</div>

<!-- PAGE 1 -->
<div class="page active">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=3648518b-3197-4133-946c-6b33a4a80dbf&accessTicket=5f5f05cd-ad16-4236-a44c-36ebc5ea9cf4&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 2 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=46b8399a-676e-480c-8e12-2913f5664d90&accessTicket=26aa621f-d6d1-494a-a14c-5b5429abb0ea&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 3 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=bfb7be3b-349c-47ba-8c36-20c309a03731&accessTicket=f1b110a9-d72b-4da1-a287-9604b5794a70&dd_orientation=auto"></iframe>
</div>

<!-- PAGE 4 -->
<div class="page">
  <iframe src="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=f93e929f-dd11-4eff-9a0d-5fe1ecbbf36c&accessTicket=d8b9cecb-6770-461a-a8a2-7fa3e3318f14&dd_orientation=auto"></iframe>
</div>

<script>
// CLOCK
setInterval(updateClock, 1000);
updateClock();

function updateClock() {
  const now = new Date();
  document.getElementById("clockRight").innerHTML =
    now.toLocaleString("en-GB", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });
}

// HOME
function goHome() {
  window.location.href = "index.html";
}

// SWITCH PAGE
let currentPage = 0;
const pages = document.querySelectorAll(".page");

setInterval(() => {
  pages[currentPage].classList.remove("active");

  currentPage = (currentPage + 1) % pages.length;

  setTimeout(() => {
    pages[currentPage].classList.add("active");
  }, 200);
}, 10000);

// REFRESH IFRAME
setInterval(() => {
  document.querySelectorAll("iframe").forEach(i => i.src = i.src);
}, 300000);

// FULLSCREEN
document.body.addEventListener("click", () => {
  document.documentElement.requestFullscreen();
});

// AUTO RELOAD
setInterval(() => {
  location.reload();
}, 1800000);
</script>

</body>
</html>
